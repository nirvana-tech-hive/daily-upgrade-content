name: Generate HTML Posts

on:
  push:
    branches: [ main ]
    paths:
      - 'content/**/post.md'

jobs:
  generate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install markdown2
      - name: Generate HTML
        run: python automation/scripts/generate_html.py
      - name: Commit HTML
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add content/**/post.html
          git commit -m "Auto-generated HTML posts"
          git push